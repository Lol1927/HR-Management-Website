service: hr-management-api

useDotenv: true

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-2
  # 환경 변수 정의
  environment:
    SALT: ${env:SALT}
    EMPLOYEES_TABLE: ${self:service}-employees-${sls:stage}
    EVENTS_TABLE: Events
    POSITIONS_TABLE: PositionsTable  
    PROVINCE_TABLE: ${self:service}-provinces-${sls:stage}
    CITY_TABLE: ${self:service}-cities-${sls:stage}
    HISTORY_TABLE: ${self:service}-history-${sls:stage}

  iam:
    role:
      statements:
        # 1. 직원 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:ConditionCheckItem # <--- 이 부분 추가! 트랜잭션 시 필요합니다.
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.EMPLOYEES_TABLE}"

        # 2. 이벤트 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.EVENTS_TABLE}"

        # 3. 포지션 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:Scan
            - dynamodb:PutItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.POSITIONS_TABLE}"

        # 4. 주(Province) 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.PROVINCE_TABLE}"

        # 5. 시(City) 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.CITY_TABLE}"

        # 6. 히스토리 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem # 히스토리 배열 업데이트(list_append)를 위해 필수
            - dynamodb:Scan
            - dynamodb:Query
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.HISTORY_TABLE}"

functions:
  # --- 기존 직원 관리 함수 ---
  employeeHandler:
    handler: functions/employeeHandler.handler # 통합된 파일 경로 (파일명 확인!)
    events:
      - http:
          path: employees
          method: post
          cors: true
      - http:
          path: employees
          method: get
          cors: true
      - http:
          path: employees/{id}
          method: put
          cors: true
      - http:
          path: employees/{id}
          method: delete
          cors: true
    
  # --- 기존 이벤트 관리 함수 ---
  eventHandler:
    handler: functions/eventHandler.handler 
    events:
      - http:
          path: events
          method: get
          cors: true
      - http:
          path: events
          method: post
          cors: true
      - http:
          path: events
          method: put
          cors: true
      - http:
          path: events/{id}
          method: delete
          cors: true

  

  # --- 포지션 관리 함수 (수정됨) ---
  positionHandler:
    handler: functions/positionHandler.handler
    events:
      - http:
          path: positions
          method: get
          cors: true
      - http:
          path: positions
          method: post
          cors: true
      - http:
          path: positions/{name}
          method: delete
          cors: true
  manageCity:
    handler: functions/cityHandler.handler # city.mjs 파일의 handler 함수
    events:
      - http:
          path: city
          method: get
          cors: true
      - http:
          path: city
          method: post
          cors: true
      - http:
          path: city/delete/{provinceName}/{cityName}
          method: delete
          cors: true

  manageProvince:
    handler: functions/provinceHandler.handler # province.mjs 파일의 handler 함수
    events:
      - http:
          path: province
          method: get
          cors: true
      - http:
          path: province
          method: post
          cors: true
      - http:
          path: province/{provinceName}
          method: delete
          cors: true

  manageHistory:
    handler: functions/employeeEventHistory.handler
    events:
      - http:
          path: history
          method: post # 생성 (추가)
          cors: true
      - http:
          path: history/{employeeId}
          method: get # 조회
          cors: true
      - http:
          path: history/{employeeId}/{eventId}
          method: put # 수정 (특정 이벤트 평가 수정)
          cors: true
      - http:
          path: history/{employeeId}/{eventId}
          method: delete # 삭제 (특정 이벤트 평가 삭제)
          cors: true  
resources:
  Resources:
    # 직원 테이블
    EmployeesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.EMPLOYEES_TABLE}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        
    # 포지션 테이블
    PositionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.POSITIONS_TABLE}
        AttributeDefinitions:
          - AttributeName: name
            AttributeType: S
        KeySchema:
          - AttributeName: name
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # 1. 주(Province) 테이블
    ProvinceTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-provinces-${sls:stage}
        AttributeDefinitions:
          - AttributeName: provinceName
            AttributeType: S
        KeySchema:
          - AttributeName: provinceName
            KeyType: HASH # 파티션 키
        BillingMode: PAY_PER_REQUEST

    # 2. 시(City) 테이블은 수동 관리 (복합키: provinceName HASH + cityName RANGE)
    # 테이블명: hr-management-api-cities-dev

    # 히스토리 테이블 생성
    HistoryTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.HISTORY_TABLE}
        AttributeDefinitions:
          - AttributeName: employeeId
            AttributeType: S
        KeySchema:
          - AttributeName: employeeId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST