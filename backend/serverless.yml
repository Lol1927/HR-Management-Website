service: hr-management-api

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-2
  # 환경 변수 정의
  environment:
    EMPLOYEES_TABLE: ${self:service}-employees-${sls:stage}
    EVENTS_TABLE: Events
    POSITIONS_TABLE: PositionsTable  
    PROVINCE_TABLE: ${self:service}-provinces-${sls:stage}
    CITY_TABLE: ${self:service}-cities-${sls:stage}

  iam:
    role:
      statements:
        # 1. 직원 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.EMPLOYEES_TABLE}"

        # 2. 이벤트 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.EVENTS_TABLE}"

        # 3. 포지션 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:Scan
            - dynamodb:PutItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.POSITIONS_TABLE}"

        # 4. 주(Province) 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.PROVINCE_TABLE}"

        # 5. 시(City) 테이블 권한
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:Scan
            - dynamodb:GetItem
            - dynamodb:DeleteItem
          Resource: "arn:aws:dynamodb:${aws:region}:*:table/${self:provider.environment.CITY_TABLE}"

functions:
  # --- 기존 직원 관리 함수 ---
  createEmployee:
    handler: functions/createEmployee.handler
    events:
      - http:
          path: employees
          method: post
          cors: true

  getEmployees:
    handler: functions/getEmployees.handler
    events:
      - http:
          path: employees
          method: get
          cors: true

  updateEmployee:
    handler: functions/updateEmployee.handler
    events:
      - http:
          path: employees/{id}
          method: put
          cors: true

  deleteEmployee:
    handler: functions/deleteEmployee.handler
    events:
      - http:
          path: employees/{id}
          method: delete
          cors: true

  # --- 기존 이벤트 관리 함수 ---
  eventHandler:
    handler: functions/eventHandler.handler 
    events:
      - http:
          path: events
          method: get
          cors: true
      - http:
          path: events
          method: post
          cors: true
      - http:
          path: events
          method: put
          cors: true
      - http:
          path: events/{id}
          method: delete
          cors: true

  # --- 포지션 관리 함수 (수정됨) ---
  positionHandler:
    handler: functions/positionHandler.handler
    events:
      - http:
          path: positions
          method: get
          cors: true
      - http:
          path: positions
          method: post
          cors: true
      - http:
          path: positions/{name}
          method: delete
          cors: true
  manageCity:
    handler: functions/cityHandler.handler # city.mjs 파일의 handler 함수
    events:
      - http:
          path: city
          method: get
          cors: true
      - http:
          path: city
          method: post
          cors: true
      - http:
          path: city/{cityName}
          method: delete
          cors: true

  manageProvince:
    handler: functions/provinceHandler.handler # province.mjs 파일의 handler 함수
    events:
      - http:
          path: province
          method: get
          cors: true
      - http:
          path: province
          method: post
          cors: true
      - http:
          path: province/{provinceName}
          method: delete
          cors: true

resources:
  Resources:
    # 직원 테이블
    EmployeesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.EMPLOYEES_TABLE}
        AttributeDefinitions:
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: id
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        
    # 포지션 테이블
    PositionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:provider.environment.POSITIONS_TABLE}
        AttributeDefinitions:
          - AttributeName: name
            AttributeType: S
        KeySchema:
          - AttributeName: name
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST

    # 1. 주(Province) 테이블
    ProvinceTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-provinces-${sls:stage}
        AttributeDefinitions:
          - AttributeName: provinceName
            AttributeType: S
        KeySchema:
          - AttributeName: provinceName
            KeyType: HASH # 파티션 키
        BillingMode: PAY_PER_REQUEST

    # 2. 시(City) 테이블
    CityTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: ${self:service}-cities-${sls:stage}
        AttributeDefinitions:
          - AttributeName: cityName
            AttributeType: S
        KeySchema:
          - AttributeName: cityName
            KeyType: HASH # 파티션 키
        BillingMode: PAY_PER_REQUEST